<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — E-Raport TK ABK</title>
  <meta name="description" content="Masuk ke sistem E-Raport TK untuk Anak Berkebutuhan Khusus" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: { DEFAULT: '#6366f1', 50: '#eef2ff', 600: '#4f46e5', 700: '#4338ca', 900: '#312e81' },
          },
          fontFamily: { sans: ['Inter', 'sans-serif'] }
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body class="min-h-screen font-sans flex items-center justify-center relative overflow-hidden bg-cover bg-center bg-no-repeat" style="background-image: url('/static/YPK_BG.jpg');">

  <!-- Background Overlay -->
  <div class="absolute inset-0 bg-slate-950/60 backdrop-blur-[2px] z-0"></div>

  <!-- Login Card -->
  <div class="relative z-10 w-full max-w-md mx-4">
    <!-- Logo/Brand -->
    <div class="text-center mb-8">
      <img src="/static/YPK_LOGO.png" alt="Logo YPK" class="h-28 mx-auto object-contain drop-shadow-md" />
    </div>

    <!-- Form Card -->
    <div class="bg-white/10 backdrop-blur-md border border-white/20 rounded-2xl p-8 shadow-2xl">
      <h2 class="text-xl font-semibold text-white mb-6">Masuk ke Akun Anda</h2>

      {% if error %}
      <div class="mb-4 px-4 py-3 bg-red-500/20 border border-red-400/40 rounded-xl text-red-200 text-sm flex items-center gap-2">
        <span>⚠️</span> {{ error }}
      </div>
      {% endif %}

      <form method="POST" action="/login" class="space-y-5">
        <div>
          <label class="block text-sm font-medium text-indigo-100 mb-1.5" for="email">Email</label>
          <input
            type="email"
            id="email"
            name="email"
            required
            placeholder="admin@rapor.tk"
            class="w-full px-4 py-3 bg-white/10 border border-white/20 rounded-xl text-white placeholder-indigo-300 focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:border-transparent transition text-sm"
          />
        </div>

        <div>
          <label class="block text-sm font-medium text-indigo-100 mb-1.5" for="password">Password</label>
          <div class="relative">
            <input
              type="password"
              id="password"
              name="password"
              required
              placeholder="••••••••"
              class="w-full px-4 py-3 bg-white/10 border border-white/20 rounded-xl text-white placeholder-indigo-300 focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:border-transparent transition text-sm"
            />
          </div>
        </div>

        <button
          type="submit"
          id="btn-login"
          class="w-full py-3 px-4 bg-indigo-500 hover:bg-indigo-400 active:bg-indigo-600 text-white font-semibold rounded-xl transition-all duration-200 shadow-lg hover:shadow-indigo-500/40 hover:-translate-y-0.5 text-sm"
        >
          Masuk
        </button>
      </form>

      <div class="mt-6 pt-5 border-t border-white/10 text-center">
        <p class="text-xs text-indigo-300">Login default: <span class="text-white font-medium">admin@rapor.tk</span> / <span class="text-white font-medium">admin123</span></p>
      </div>
    </div>

    <p class="text-center text-xs text-indigo-400 mt-6">E-Raport TK ABK &copy; 2025</p>
  </div>
</body>
</html>
