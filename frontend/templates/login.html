<!DOCTYPE html>
<html lang="id" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — E-Raport TK ABK</title>
  <meta name="description" content="Masuk ke sistem E-Raport TK untuk Anak Berkebutuhan Khusus" />
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- daisyUI CDN -->
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet" type="text/css" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: { DEFAULT: '#6366f1', 50: '#eef2ff', 600: '#4f46e5', 700: '#4338ca', 900: '#312e81' },
          },
          fontFamily: { sans: ['Inter', 'sans-serif'] }
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/css/custom.css?v=2" />
</head>
<body class="min-h-screen font-sans flex items-center justify-center relative overflow-hidden bg-cover bg-center bg-no-repeat login-body">

  <!-- Background Overlay -->
  <div class="absolute inset-0 bg-slate-950/60 backdrop-blur-[2px] z-0"></div>

  <!-- Login Card -->
  <div class="relative z-10 w-full max-w-md mx-4">
    <!-- Logo/Brand -->
    <div class="text-center mb-8">
      <img src="/static/YPK_LOGO.png?v=2" alt="Logo YPK" class="h-28 mx-auto object-contain drop-shadow-md" />
    </div>

    <!-- Form Card -->
    <div class="card bg-white/10 backdrop-blur-lg border border-white/20 shadow-2xl">
      <div class="card-body p-8">
        <h2 class="text-xl font-semibold text-white mb-6">Masuk ke Akun Anda</h2>

        {% if error %}
        <div class="alert alert-error mb-5 text-white bg-red-600/30 border-red-500/40 text-sm flex items-center gap-2.5">
          <svg class="w-5 h-5 text-red-300 flex-shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
          </svg>
          <span>{{ error }}</span>
        </div>
        {% endif %}

        <form method="POST" action="/login" class="space-y-5">
          <div class="form-control w-full">
            <label class="label" for="email">
              <span class="label-text text-indigo-100 font-medium">Email</span>
            </label>
            <div class="relative">
              <span class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
                <svg class="w-5 h-5 text-indigo-300" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
                </svg>
              </span>
              <input
                type="email"
                id="email"
                name="email"
                required
                placeholder="admin@rapor.tk"
                class="input input-bordered w-full pl-11 bg-white/10 border-white/20 text-white placeholder-indigo-300 focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:border-transparent transition text-sm"
              />
            </div>
          </div>

          <div class="form-control w-full">
            <label class="label" for="password">
              <span class="label-text text-indigo-100 font-medium">Password</span>
            </label>
            <div class="relative">
              <span class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
                <svg class="w-5 h-5 text-indigo-300" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
                </svg>
              </span>
              <input
                type="password"
                id="password"
                name="password"
                required
                placeholder="••••••••"
                class="input input-bordered w-full pl-11 bg-white/10 border-white/20 text-white placeholder-indigo-300 focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:border-transparent transition text-sm"
              />
            </div>
          </div>

          <button
            type="submit"
            id="btn-login"
            class="btn btn-primary w-full text-white font-semibold shadow-lg hover:shadow-indigo-500/40 hover:-translate-y-0.5 text-sm cursor-pointer"
          >
            Masuk
          </button>
        </form>

        <div class="mt-6 pt-5 border-t border-white/10 text-center">
          <p class="text-xs text-indigo-200">Login default: <span class="text-white font-medium">admin@rapor.tk</span> / <span class="text-white font-medium">admin123</span></p>
        </div>
      </div>
    </div>

    <p class="text-center text-xs text-indigo-400 mt-6">E-Raport TK ABK &copy; 2025</p>
  </div>
</body>
</html>
